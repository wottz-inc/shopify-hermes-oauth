name: Deploy Shopify app config

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment to deploy (staging or production)
        required: true
        type: choice
        options:
          - staging
          - production


permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Shopify app config
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
      SHOPIFY_CONFIG_NAME: ${{ inputs.environment }}
      SOURCE_CONTROL_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
      DEPLOY_MESSAGE: ${{ github.workflow }} run ${{ github.run_number }}
      DEPLOY_VERSION: ${{ github.sha }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        shell: bash
        env:
          SHOPIFY_APP_AUTOMATION_TOKEN_PRESENT: ${{ secrets.SHOPIFY_APP_AUTOMATION_TOKEN != '' }}
        run: |
          set -euo pipefail
          test "${SHOPIFY_APP_AUTOMATION_TOKEN_PRESENT}" = "true"
          test -n "${SHOPIFY_CLIENT_ID}"

      - name: Deploy Shopify app config
        shell: bash
        env:
          SHOPIFY_APP_AUTOMATION_TOKEN: ${{ secrets.SHOPIFY_APP_AUTOMATION_TOKEN }}
        run: |
          set -euo pipefail
          npm exec --yes --package @shopify/cli@4.1.0 -- shopify app deploy \
            --config "${SHOPIFY_CONFIG_NAME}" \
            --client-id "${SHOPIFY_CLIENT_ID}" \
            --path . \
            --allow-updates \
            --source-control-url "${SOURCE_CONTROL_URL}" \
            --message "${DEPLOY_MESSAGE}" \
            --version "${DEPLOY_VERSION}"
